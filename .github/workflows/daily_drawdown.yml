name: Daily drawdown watch

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-drawdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Check watchlist drawdowns
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          DRAWDOWN_THRESHOLD: "20"
          DRAWDOWN_PERIOD: "1y"
        run: python drawdown_monitor.py

      - name: Save latest check result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_drawdown.csv
          git diff --cached --quiet || git commit -m "Update daily drawdown check"
          git push
